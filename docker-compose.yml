# DocQ&A — Local development / demo stack
#
# Usage:
#   docker compose up
#
# Then start the Streamlit UI (outside Docker, in a separate terminal):
#   set API_BASE_URL=http://localhost:8080 && streamlit run streamlit_app.py

services:

  # ── Qdrant vector database (local) ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docqa-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
      #  healthcheck:
      # test: [ "CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1" ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
      # start_period: 10s

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docqa-backend
    ports:
      - "8080:8080"
    env_file:
      - .env # your local secrets (GEMINI_API_KEY, etc.)
    environment:
      # Override to point at the local Qdrant container
      VECTOR_STORE_BACKEND: qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      API_PORT: "8080"
    # Wait for Qdrant container to exist, then give it 5s to finish starting
    depends_on:
      - qdrant
    entrypoint: [ "sh", "-c", "sleep 5 && uvicorn src.app:app --host 0.0.0.0 --port 8080 --log-level info" ]
    volumes:
      - backend_data:/app/data # persist FAISS fallback data across restarts
    restart: on-failure
    # qdrant:
    #     condition: service_healthy

volumes:
  qdrant_data:
  backend_data:
